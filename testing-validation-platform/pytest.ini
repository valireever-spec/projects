[pytest]
# pytest configuration for testing-validation-platform

testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Minimum Python version
minversion = 7.0

# Add options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=backend
    --cov-report=html:htmlcov
    --cov-report=term-missing:skip-covered
    --cov-fail-under=80

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (require tracker API)
    slow: Slow tests (may take >1 second)
    tracker: Tests that interact with tracker API
    sync: Tests for vmodel_sync functionality
    client: Tests for tracker_client

# Coverage configuration
[coverage:run]
branch = True
omit =
    */tests/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract
